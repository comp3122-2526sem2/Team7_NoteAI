name: Build and Push Frontend Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/noteai-frontend

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # tag :latest on every push to main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # tag :v1.2.3 from git tags
            type=semver,pattern={{version}}
            # tag :sha-<short-sha> for traceability
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Pass the backend API URL as a build argument.
          # Set NEXT_PUBLIC_API_URL in your repository secrets/variables.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          # Cache layers in the GitHub Actions cache for faster rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
